<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="display"></div>
    <div class="numbers">
        <button id="numButton">1</button>
        <button id="numButton">2</button>
        <button id="numButton">3</button>
        <button id="numButton">4</button>
        <button id="numButton">5</button>
        <button id="numButton">6</button>
        <button id="numButton">7</button>
        <button id="numButton">8</button>
        <button id="numButton">9</button>
        <button id="numButton">0</button>
        <button id="dotButton">.</button>
    </div>
    <div class="operatorButtons">
        <button id="plus">+</button>
        <button id="minus">-</button>
        <button id="times">x</button>
        <button id="divide">/</button>
        <button id="equal">=</button>
        <button id="clear">clear</button>
        <button id="del">Del</button>
    </div>
    
</body>
</html>
